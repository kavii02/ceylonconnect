<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Meta tag to define character encoding -->
    <meta charset="UTF-8" />
    <!-- Page title shown in the browser tab -->
    <title>Notifications - CeylonConneet</title>
    <!-- Link to external CSS file for styling -->
    <link rel="stylesheet" href="styles/notifications.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="main-header">
      <div class="header-container">
        <div class="logo-group">
          <img
            src="photos/logo.png"
            alt="CeylonConnect Logo"
            class="logo-img"
          />
          <h1 class="logo-header">CeylonConnect</h1>
        </div>
        <nav class="nav-links">
          <a href="#">Home</a>
        </nav>
      </div>
    </header>
    <main class="main-content">
      <!-- Container for all notification messages -->
      <div class="notifications">
        <!-- Single notification of type "info" -->
        <div class="notification info">
          <!-- Icon representing the notification type -->
          <span class="icon">📩</span>
          <!-- Notification text -->
          <p>You received a new exchange request for “Python Lessons”.</p>
        </div>

        <!-- Single notification of type "success" -->
        <div class="notification success">
          <span class="icon">✅</span>
          <p>Your offer “IT Books” was accepted by Nimal Perera.</p>
        </div>

        <!-- Single notification of type "message" -->
        <div class="notification message">
          <span class="icon">💬</span>
          <p>You have a new message from Malsha Fernando.</p>
        </div>
      </div>
    </main>
    <!-- Footer -->
    <footer class="main-footer">
      <div class="footer-bottom">
        <p>
          © 2025 CeylonConnect. All rights reserved. | Designed by CST 23 – UWU
        </p>
      </div>
    </footer>
  </body>
</html>
